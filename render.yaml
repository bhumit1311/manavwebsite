services:
  - type: web
    name: shraddhavideology
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: ADMIN_TOKEN
        sync: false        # Set a secure random string in Render dashboard
      - key: NODE_ENV
        value: production
